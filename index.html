<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilates Pulse | Luxury Admin</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #050505;
            --card: #121214;
            --accent: #ffffff;
            --celeste: #a2d2ff;
            --danger: #ff2d55;
            --whatsapp: #25D366;
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Montserrat', sans-serif;
            --font-fancy: 'Playfair Display', serif;
        }

        @keyframes bokehFloat {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.03; }
            50% { transform: translateY(-100px) translateX(20px); opacity: 0.05; }
            90% { opacity: 0.03; }
            100% { transform: translateY(-200px) translateX(-20px); opacity: 0; }
        }

        @keyframes cardPulse {
            0% { box-shadow: 0 0 5px rgba(255,255,255,0.01); border-color: rgba(255,255,255,0.08); }
            50% { box-shadow: 0 0 15px rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.15); }
            100% { box-shadow: 0 0 5px rgba(255,255,255,0.01); border-color: rgba(255,255,255,0.08); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-25deg); }
            100% { transform: translateX(150%) skewX(-25deg); }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: var(--font-main);
            margin: 0; 
            background: var(--bg); 
            color: #fff; 
            overflow-x: hidden; 
            letter-spacing: -0.02em; 
            position: relative;
        }

        .bokeh-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .bokeh {
            position: absolute;
            background: rgba(255, 255, 255, 1);
            border-radius: 50%;
            filter: blur(30px);
            opacity: 0;
            animation: bokehFloat infinite linear;
        }

        /* --- PANTALLA MANTENIMIENTO --- */
        #mantenimiento-bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        .logout-container { position: absolute; top: 20px; right: 20px; z-index: 1000; }
        .btn-logout { background: transparent; border: 1px solid var(--border); color: #888;
            padding: 8px 12px; border-radius: 12px; font-size: 0.55rem; font-weight: 900; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: all 0.3s;
        }
        .btn-logout:active { background: var(--danger); color: white; border-color: var(--danger); }

        #login-section {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .branding-container { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
            padding: 20px 0; position: relative; }
        .logo-pulse-circle { width: 80px; height: 80px;
            background: #fff; border-radius: 50%; overflow: hidden; border: 3px solid #1a1a1c; transition: transform 0.5s ease;
        }
        .logo-pulse-circle img { width: 100%; height: 100%; object-fit: cover; }
        .brand-text { font-weight: 900; letter-spacing: 5px; margin-top: 15px; font-size: 1rem; text-transform: uppercase; }

        .search-container { margin-bottom: 20px; position: relative; }
        .search-input { background: #1a1a1c; border: 1px solid var(--border);
            padding: 15px 20px 15px 45px; border-radius: 20px; color: #fff; width: 100%; transition: all 0.3s;
        }
        .search-input:focus { border-color: rgba(255,255,255,0.3); background: #202022; }
        .search-icon { position: absolute; left: 18px; top: 16px; opacity: 0.3; }

        input, select, textarea { width: 100%; background: #1a1a1c; border: 1px solid var(--border);
            padding: 18px; border-radius: 20px; color: #fff; margin-bottom: 15px; font-family: inherit;
        }
        
        .btn-principal { 
            background: #fff; color: #000; border: none; padding: 20px; border-radius: 20px; 
            font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; position: relative; overflow: hidden;
        }

        .btn-principal::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: shimmer 2s infinite; animation-delay: 1s;
        }

        .btn-cancelar { background: #1a1a1c; color: #777; border: 1px solid var(--border);
            padding: 15px; border-radius: 20px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: 800;
        }
        
        .main-container { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 150px; position: relative; z-index: 1; }
        
        .dia-item { 
            background: var(--card); margin-bottom: 15px; border-radius: 30px; border: 1px solid var(--border); 
            overflow: hidden; animation: cardPulse 4s infinite ease-in-out;
        }

        .dia-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .clase-box { 
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; margin-bottom: 12px; 
            border: 1px solid var(--border); position: relative; animation: cardPulse 5s infinite ease-in-out; animation-delay: 1s;
        }

        .ficha-detalles { display: none; margin-top: 15px; padding: 20px; background: rgba(0,0,0,0.6); border-radius: 20px;
            font-size: 0.8rem; border: 1px solid var(--border); line-height: 1.6; }

        .vence-alerta { color: var(--danger) !important; text-shadow: 0 0 10px rgba(255, 45, 85, 0.3); }

        .ws-wrapper { display: inline-flex; align-items: center; text-decoration: none; margin-top: 5px; transition: transform 0.2s; }
        .ws-icon { width: 18px; height: 18px; margin-right: 8px; object-fit: contain; }
        .ws-number { color: var(--whatsapp); font-weight: 700; font-size: 0.8rem; }

        .ws-agenda-icon { width: 16px; height: 16px; margin-left: 6px; vertical-align: text-bottom; cursor: pointer; transition: transform 0.2s; }

        .crono-header-text { font-family: var(--font-fancy); font-size: 2.2rem; text-align: center; margin-bottom: 30px; color: #fff; }
        .crono-row { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); padding: 20px 0; }
        .crono-dia-label { font-family: var(--font-fancy); font-size: 1.5rem; color: var(--celeste); margin-bottom: 10px; font-style: italic; }
        .crono-task-main { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: #fff; }
        .crono-bullet { width: 6px; height: 6px; background: var(--celeste); border-radius: 50%; margin-right: 12px; }
        .crono-detail-box { display: none; margin: 10px 0 10px 18px; padding: 15px; background: #1a1a1c; border-radius: 15px; border: 1px solid var(--border); font-size: 0.75rem; color: #aaa; }

        .footer-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; z-index: 999; }
        .footer-nav.is-admin { grid-template-columns: repeat(5, 1fr); }

        .nav-btn { background: rgba(15, 15, 15, 0.85); color: #fff; padding: 12px 2px; border-radius: 15px; border: 1px solid var(--border); font-weight: 800; font-size: 0.5rem; cursor: pointer; text-align: center; }
        .nav-btn.active-btn { background: #fff; color: #000; }
        .dot-notif { position: absolute; top: 5px; right: 5px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; display: none; }

        .status-pill { padding: 12px 20px; border-radius: 50px; font-weight: 900; font-size: 0.7rem; margin-bottom: 25px; display: inline-block; }
        .pill-off { background: var(--whatsapp); color: #000; }
        .pill-on { background: var(--danger); color: #fff; }
    </style>
</head>
<body>

    <div class="bokeh-container"></div>

    <div id="mantenimiento-bloqueo">
        <div class="logo-pulse-circle" style="width: 120px; height: 120px;"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
        <h1 style="font-family: var(--font-fancy); color: #fff; margin-top: 30px;">Pilates Pulse</h1>
        <p style="letter-spacing: 2px; font-size: 0.9rem; opacity: 0.8; padding: 0 30px;">¡Pilates Pulse web esta en mantenimiento!</p>
    </div>

    <div id="login-section">
        <div class="branding-container">
            <div class="logo-pulse-circle"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text">PILATES PULSE</div>
        </div>
        <div style="width: 90%; max-width: 380px;">
            <input type="text" id="adminUser" placeholder="ADMIN ID">
            <input type="password" id="adminPass" placeholder="PASSWORD">
            <button onclick="handleLogin()" class="btn-principal">ACCEDER</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="logout-container"><button class="btn-logout" onclick="handleLogout()">Cerrar Sesión</button></div>

        <div class="branding-container" id="main-brand" onclick="location.reload()" style="cursor:pointer">
            <div class="logo-pulse-circle" style="width: 60px; height: 60px;"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text" style="font-size: 0.8rem;">PILATES PULSE</div>
        </div>

        <div class="main-container">
            <div id="modulo-mantenimiento" style="display:none; text-align: center;">
                <h2 style="font-family: var(--font-fancy); font-size: 2.2rem;">Mantenimiento</h2>
                <div id="status-actual" class="status-pill pill-off">WEB ACTIVA</div>
                <div style="background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid var(--border);">
                    <label>¿ACTIVAR MANTENIMIENTO?</label>
                    <select id="select-mantenimiento" onchange="toggleMantenimiento(this.value)">
                        <option value="false">NO</option>
                        <option value="true">SI</option>
                    </select>
                </div>
            </div>

            <div id="modulo-agenda"><div id="listaDias"></div></div>
            <div id="modulo-cronograma" style="display:none;">
                <div class="crono-header-text">Cronograma</div>
                <div id="edit-form-crono" style="margin-bottom: 20px;"></div>
                <div id="render-cronograma"></div>
            </div>
            <div id="modulo-notificaciones" style="display:none;">
                <h3 style="font-size:0.7rem; color:#fff; text-align:center; margin-bottom:20px;">VENCIMIENTOS</h3>
                <div id="lista-notificaciones"></div>
            </div>
            <div id="modulo-alumnos" style="display:none;">
                <div class="search-container"><span class="search-icon">🔍</span><input type="text" id="buscadorAlumnos" class="search-input" placeholder="Buscar..." onkeyup="filtrarAlumnos()"></div>
                <button id="btn-abrir-registro" class="btn-principal" style="margin-bottom:20px; font-size:0.7rem;" onclick="abrirFormNuevoAlumno()">+ REGISTRAR ALUMNO</button>
                <div id="form-alumno-nuevo"></div>
                <div id="render-alumnos"></div>
            </div>

            <div class="footer-nav" id="footer-nav-bar">
                <button class="nav-btn" id="btn-agenda" onclick="switchModulo('modulo-agenda')">AGENDA</button>
                <button class="nav-btn" id="btn-crono" onclick="switchModulo('modulo-cronograma')">CRONO</button>
                <button class="nav-btn" id="btn-db" onclick="switchModulo('modulo-alumnos')">BASE DATOS</button>
                <button class="nav-btn" id="btn-notif" onclick="switchModulo('modulo-notificaciones')">NOTIF. <div class="dot-notif" id="active-dot"></div></button>
                <button class="nav-btn" id="btn-mantenimiento" style="display:none;" onclick="switchModulo('modulo-mantenimiento')">MANT.</button>
            </div>
        </div>
    </div>

    <script>
        const _sp = supabase.createClient("https://iodtfnclwwgcczxgbmbq.supabase.co", "sb_publishable_uOUPFEp0T_uX85fjqi9xog_6WUS6dKg");
        const DIAS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        const CLASES = ["Align Flow", "Power Flow", "Stretch&Release", "Aerial Balance", "Mega Core", "Life Align"];
        const MODALIDADES = ["Grupales", "Privadas", "Masajes", "Cumpleaños"];
        const FRECUENCIAS = ["1/semana", "2/semana", "3/semana"];
        const WS_ICON_URL = "https://i.postimg.cc/9M0NRgcD/Whats-App-svg.webp";
        let CACHE_ALUMNOS = [], CACHE_HORARIOS = [], CURRENT_USER = "";

        window.onload = async () => {
            initBokeh();
            await checkMaintenanceStatus();
            if (localStorage.getItem('studio_auth')) {
                CURRENT_USER = localStorage.getItem('user_id');
                startApp();
            } else {
                document.getElementById('login-section').style.display = 'flex';
            }
        };

        async function checkMaintenanceStatus() {
            try {
                const { data } = await _sp.from('configuracion').select('mantenimiento').eq('id', 1).maybeSingle();
                if (data && data.mantenimiento === true && !localStorage.getItem('studio_auth')) {
                    document.getElementById('mantenimiento-bloqueo').style.display = 'flex';
                }
            } catch (e) { console.log("Error mantenimiento:", e); }
        }

        async function loadMaintenanceView() {
            const { data } = await _sp.from('configuracion').select('mantenimiento').eq('id', 1).maybeSingle();
            if (data) {
                document.getElementById('select-mantenimiento').value = data.mantenimiento.toString();
                const pill = document.getElementById('status-actual');
                pill.innerText = data.mantenimiento ? "MODO MANTENIMIENTO: ACTIVO" : "SISTEMA ONLINE";
                pill.className = `status-pill ${data.mantenimiento ? 'pill-on' : 'pill-off'}`;
            }
        }

        async function toggleMantenimiento(val) {
            const boolVal = (val === "true");
            await _sp.from('configuracion').update({ mantenimiento: boolVal }).eq('id', 1);
            loadMaintenanceView();
        }

        async function handleLogin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            const { data } = await _sp.from('usuarios_admin').select('*').eq('usuario', u).eq('password', p).maybeSingle();
            if (data) { 
                localStorage.setItem('studio_auth', 'true');
                localStorage.setItem('user_id', u);
                CURRENT_USER = u;
                startApp();
            } else alert("Acceso denegado");
        }

        function handleLogout() { localStorage.clear(); location.reload(); }

        function startApp() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            if (CURRENT_USER === "ADMIN") {
                document.getElementById('btn-mantenimiento').style.display = 'block';
                document.getElementById('footer-nav-bar').classList.add('is-admin');
                loadMaintenanceView();
            }
            renderEstructura();
            updateAll();
        }

        function renderEstructura() {
            document.getElementById('listaDias').innerHTML = DIAS.map(d => `
                <div class="dia-item">
                    <div class="dia-header" onclick="toggleDia('${d}')">
                        <span style="font-weight:900; font-size:0.75rem;">${d.toUpperCase()}</span>
                        <span id="badge-${d}" style="font-size:0.5rem; opacity:0.5; background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:8px;">0</span>
                    </div>
                    <div class="dia-content" id="cont-${d}" style="display:none; padding: 0 20px 20px 20px;">
                        <div id="clase-form-${d}"></div>
                        <button class="btn-principal" style="font-size:0.55rem; background:#1a1a1c; color:#fff; padding:12px;" onclick="addClasePopup('${d}')">+ CLASE</button>
                        <div id="clases-${d}" style="margin-top:15px;"></div>
                    </div>
                </div>`).join('');
        }

        function toggleDia(d) {
            const el = document.getElementById(`cont-${d}`);
            const vis = el.style.display === 'block';
            document.querySelectorAll('.dia-content').forEach(c => c.style.display = 'none');
            el.style.display = vis ? 'none' : 'block';
        }

        function generarHoras(selected = "") {
            let res = "";
            for(let i=7; i<=21; i++) {
                let h = i > 12 ? i-12 : i; let ampm = i >= 12 ? "PM" : "AM";
                let t1 = `${h}:00 ${ampm}`, t2 = `${h}:30 ${ampm}`;
                res += `<option ${selected==t1?'selected':''}>${t1}</option><option ${selected==t2?'selected':''}>${t2}</option>`;
            } return res;
        }

        function addClasePopup(dia, editId = null, existingData = null) {
            const p = existingData ? existingData.split('|') : ["", "", "", ""];
            const targetDiv = editId && document.getElementById('modulo-cronograma').style.display === 'block' ? 'edit-form-crono' : `clase-form-${dia}`;
            document.getElementById(targetDiv).innerHTML = `
                <div style="background:#000; padding:15px; border-radius:20px; border:1px solid #222;">
                    <label>HORA</label><select id="h-${dia}">${generarHoras(p[0])}</select>
                    <label>TIPO</label><select id="t-${dia}">${CLASES.map(c=>`<option ${p[1]==c?'selected':''}>${c}</option>`).join('')}</select>
                    <label>MODALIDAD</label><select id="m-${dia}">${MODALIDADES.map(m=>`<option ${p[2]==m?'selected':''}>${m}</option>`).join('')}</select>
                    <label>ALUMNOS</label><input type="text" id="n-${dia}" value="${p[3]}">
                    <button class="btn-principal" onclick="pushClase('${dia}', '${editId}')">GUARDAR</button>
                    <button class="btn-cancelar" onclick="document.getElementById('${targetDiv}').innerHTML=''">CANCELAR</button>
                </div>`;
        }

        async function pushClase(dia, editId = "null") {
            const content = `${document.getElementById('h-'+dia).value}|${document.getElementById('t-'+dia).value}|${document.getElementById('m-'+dia).value}|${document.getElementById('n-'+dia).value}`;
            if (editId !== "null") await _sp.from('horarios').update({ contenido: content }).eq('id', editId);
            else await _sp.from('horarios').insert([{ celda_id: dia, contenido: content }]);
            updateAll();
        }

        async function updateAll() {
            const { data } = await _sp.from('horarios').select('*');
            if(!data) return;
            CACHE_ALUMNOS = data.filter(x => x.celda_id === 'DB_ENTRY');
            CACHE_HORARIOS = data.filter(x => x.celda_id !== 'DB_ENTRY').sort((a,b) => a24h(a.contenido.split('|')[0]) - a24h(b.contenido.split('|')[0]));
            DIAS.forEach(d => {
                const filtrados = CACHE_HORARIOS.filter(x => x.celda_id === d);
                document.getElementById(`badge-${d}`).innerText = filtrados.length;
                document.getElementById(`clases-${d}`).innerHTML = filtrados.map(i => {
                    const p = i.contenido.split('|');
                    return `<div class="clase-box"><b>${p[0]}</b> — ${p[1]}<br><small>${p[2]}</small><br>${p[3]}
                        <div style="text-align:right;"><span onclick="borrar('${i.id}')" style="cursor:pointer; color:red;">×</span></div>
                    </div>`;
                }).join('');
            });
            renderAlumnosList(CACHE_ALUMNOS);
            renderCronograma();
        }

        function a24h(h) {
            if(!h) return 0;
            let [t, a] = h.split(' '); let [hh, mm] = t.split(':').map(Number);
            if(a==="PM" && hh<12) hh+=12; if(a==="AM" && hh===12) hh=0;
            return hh*60+mm;
        }

        function renderCronograma() {
            document.getElementById('render-cronograma').innerHTML = DIAS.map(d => {
                const clases = CACHE_HORARIOS.filter(x => x.celda_id === d);
                return `<div class="crono-row"><div class="crono-dia-label">${d}</div>${clases.map(c => `<div>${c.contenido.split('|')[0]} - ${c.contenido.split('|')[1]}</div>`).join('')}</div>`;
            }).join('');
        }

        function renderAlumnosList(l) {
            document.getElementById('render-alumnos').innerHTML = l.map(a => `<div class="clase-box"><b>${a.contenido.split('|')[1]}</b></div>`).join('');
        }

        function switchModulo(id) {
            ['modulo-agenda', 'modulo-cronograma', 'modulo-alumnos', 'modulo-notificaciones', 'modulo-mantenimiento'].forEach(m => document.getElementById(m).style.display = m === id ? 'block' : 'none');
            document.getElementById('main-brand').style.display = (id === 'modulo-cronograma' || id === 'modulo-mantenimiento') ? 'none' : 'flex';
        }

        async function borrar(id) { if(confirm("¿Borrar?")) { await _sp.from('horarios').delete().eq('id', id); updateAll(); } }

        function initBokeh() {
            const c = document.querySelector('.bokeh-container');
            for(let i=0; i<15; i++) {
                const b = document.createElement('div'); b.className = 'bokeh';
                b.style.width = b.style.height = `${Math.random()*150+50}px`;
                b.style.left = `${Math.random()*100}%`; b.style.top = `${Math.random()*100}%`;
                b.style.animationDuration = `${Math.random()*20+15}s`; c.appendChild(b);
            }
        }
    </script>
</body>
</html>
