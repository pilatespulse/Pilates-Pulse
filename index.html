<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilates Pulse | Luxury Admin</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #050505;
            --card: #121214;
            --accent: #ffffff;
            --celeste: #a2d2ff;
            --danger: #ff2d55;
            --whatsapp: #25D366;
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Montserrat', sans-serif;
            --font-fancy: 'Playfair Display', serif;
        }

        @keyframes bokehFloat {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.03; }
            50% { transform: translateY(-100px) translateX(20px); opacity: 0.05; }
            90% { opacity: 0.03; }
            100% { transform: translateY(-200px) translateX(-20px); opacity: 0; }
        }

        @keyframes cardPulse {
            0% { box-shadow: 0 0 5px rgba(255,255,255,0.01); border-color: rgba(255,255,255,0.08); }
            50% { box-shadow: 0 0 15px rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.15); }
            100% { box-shadow: 0 0 5px rgba(255,255,255,0.01); border-color: rgba(255,255,255,0.08); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-25deg); }
            100% { transform: translateX(150%) skewX(-25deg); }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: var(--font-main);
            margin: 0; 
            background: var(--bg); 
            color: #fff; 
            overflow-x: hidden; 
            letter-spacing: -0.02em; 
            position: relative;
        }

        .bokeh-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .bokeh {
            position: absolute;
            background: rgba(255, 255, 255, 1);
            border-radius: 50%;
            filter: blur(30px);
            opacity: 0;
            animation: bokehFloat infinite linear;
        }

        /* OVERLAY MANTENIMIENTO */
        #mantenimiento-bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        .logout-container { position: absolute; top: 20px; right: 20px; z-index: 1000; }
        .btn-logout { background: transparent; border: 1px solid var(--border); color: #888; padding: 8px 12px; border-radius: 12px; font-size: 0.55rem; font-weight: 900; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: all 0.3s; }
        .btn-logout:active { background: var(--danger); color: white; border-color: var(--danger); }

        #login-section {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .branding-container { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px 0; position: relative; }
        .logo-pulse-circle { width: 80px; height: 80px; background: #fff; border-radius: 50%; overflow: hidden; border: 3px solid #1a1a1c; transition: transform 0.5s ease; }
        .logo-pulse-circle img { width: 100%; height: 100%; object-fit: cover; }
        .brand-text { font-weight: 900; letter-spacing: 5px; margin-top: 15px; font-size: 1rem; text-transform: uppercase; }

        .search-container { margin-bottom: 20px; position: relative; }
        .search-input { background: #1a1a1c; border: 1px solid var(--border); padding: 15px 20px 15px 45px; border-radius: 20px; color: #fff; width: 100%; transition: all 0.3s; }
        .search-icon { position: absolute; left: 18px; top: 16px; opacity: 0.3; }

        input, select, textarea { width: 100%; background: #1a1a1c; border: 1px solid var(--border); padding: 18px; border-radius: 20px; color: #fff; margin-bottom: 15px; font-family: inherit; }
        
        .btn-principal { 
            background: #fff;
            color: #000; 
            border: none; 
            padding: 20px; 
            border-radius: 20px; 
            font-weight: 900; 
            width: 100%; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            position: relative;
            overflow: hidden; 
        }

        .btn-principal::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: shimmer 2s infinite;
        }

        .btn-cancelar { background: #1a1a1c; color: #777; border: 1px solid var(--border); padding: 15px; border-radius: 20px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: 800; }
        
        .main-container { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 150px; position: relative; z-index: 1; }
        
        .dia-item { 
            background: var(--card);
            margin-bottom: 15px; 
            border-radius: 30px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
            animation: cardPulse 4s infinite ease-in-out;
        }

        .dia-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .clase-box { 
            background: rgba(255,255,255,0.03);
            padding: 20px; 
            border-radius: 25px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border); 
            position: relative; 
        }

        .ficha-detalles { display: none; margin-top: 15px; padding: 20px; background: rgba(0,0,0,0.6); border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--border); line-height: 1.6; }

        .vence-alerta { color: var(--danger) !important; text-shadow: 0 0 10px rgba(255, 45, 85, 0.3); }

        /* CRONOGRAMA */
        .crono-header-text { font-family: var(--font-fancy); font-size: 2.2rem; text-align: center; margin-bottom: 30px; color: #fff; }
        .crono-row { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); padding: 20px 0; }
        .crono-dia-label { font-family: var(--font-fancy); font-size: 1.5rem; color: var(--celeste); margin-bottom: 10px; font-style: italic; }
        .crono-task-main { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: #fff; }
        .crono-bullet { width: 6px; height: 6px; background: var(--celeste); border-radius: 50%; margin-right: 12px; }

        /* NAVEGACION FOOTER */
        .footer-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; z-index: 999; }
        /* Ajuste dinámico para 5 botones si es Admin */
        .footer-nav.is-admin { grid-template-columns: repeat(5, 1fr); }

        .nav-btn { background: rgba(15, 15, 15, 0.85); color: #fff; padding: 12px 2px; border-radius: 15px; border: 1px solid var(--border); font-weight: 800; font-size: 0.5rem; cursor: pointer; text-align: center; transition: all 0.3s; }
        .nav-btn.active-btn { background: #fff; color: #000; }
        .dot-notif { position: absolute; top: 5px; right: 5px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; display: none; }

        label { display: block; font-size: 0.55rem; color: #888; margin-bottom: 6px; font-weight: 900; text-transform: uppercase; margin-left: 5px; }

        /* STATUS MANTENIMIENTO ADMIN */
        .status-pill { padding: 12px 20px; border-radius: 50px; font-weight: 900; font-size: 0.7rem; margin-bottom: 25px; display: inline-block; letter-spacing: 1px; }
        .pill-off { background: var(--whatsapp); color: #000; }
        .pill-on { background: var(--danger); color: #fff; }

    </style>
</head>
<body>

    <div class="bokeh-container"></div>

    <div id="mantenimiento-bloqueo">
        <div class="logo-pulse-circle" style="width: 120px; height: 120px;"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
        <h1 style="font-family: var(--font-fancy); color: #fff; margin-top: 30px;">Pilates Pulse</h1>
        <p style="letter-spacing: 2px; font-size: 0.9rem; opacity: 0.8; padding: 0 30px;">¡Pilates Pulse web esta en mantenimiento!</p>
    </div>

    <div id="login-section">
        <div class="branding-container">
            <div class="logo-pulse-circle"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text">PILATES PULSE</div>
        </div>
        <div style="width: 90%; max-width: 380px;">
            <input type="text" id="adminUser" placeholder="ADMIN ID">
            <input type="password" id="adminPass" placeholder="PASSWORD">
            <button onclick="handleLogin()" class="btn-principal">ACCEDER</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="logout-container">
            <button class="btn-logout" onclick="handleLogout()">Cerrar Sesión</button>
        </div>

        <div class="branding-container" id="main-brand" onclick="location.reload()" style="cursor:pointer">
            <div class="logo-pulse-circle" style="width: 60px; height: 60px;"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text" style="font-size: 0.8rem;">PILATES PULSE</div>
        </div>

        <div class="main-container">
            
            <div id="modulo-mantenimiento" style="display:none; text-align: center;">
                <h2 style="font-family: var(--font-fancy); font-size: 2.2rem; margin-bottom: 10px;">Ajustes</h2>
                <div id="status-actual" class="status-pill pill-off">WEB ACTIVA</div>
                
                <div style="background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid var(--border); margin-top: 10px;">
                    <label>¿MODO MANTENIMIENTO?</label>
                    <select id="select-mantenimiento" onchange="toggleMantenimiento(this.value)">
                        <option value="NO">NO</option>
                        <option value="SI">SI</option>
                    </select>
                    <p style="font-size: 0.6rem; color: #666; margin-top: 15px;">Si seleccionas "SI", los usuarios verán el cartel de mantenimiento al entrar.</p>
                </div>
            </div>

            <div id="modulo-agenda">
                <div id="listaDias"></div>
            </div>

            <div id="modulo-cronograma" style="display:none;">
                <div class="crono-header-text">Cronograma</div>
                <div id="edit-form-crono" style="margin-bottom: 20px;"></div>
                <div id="render-cronograma"></div>
            </div>

            <div id="modulo-notificaciones" style="display:none;">
                <h3 style="font-size:0.7rem; color:#fff; letter-spacing:2px; text-align:center; margin-bottom:20px;">PRÓXIMOS VENCIMIENTOS</h3>
                <div id="lista-notificaciones"></div>
            </div>

            <div id="modulo-alumnos" style="display:none;">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="buscadorAlumnos" class="search-input" placeholder="Buscar alumno..." onkeyup="filtrarAlumnos()">
                </div>
                <button id="btn-abrir-registro" class="btn-principal" style="margin-bottom:20px; font-size:0.7rem;" onclick="abrirFormNuevoAlumno()">+ REGISTRAR ALUMNO</button>
                <div id="form-alumno-nuevo"></div>
                <div id="render-alumnos"></div>
            </div>

            <div class="footer-nav" id="footer-nav-bar">
                <button class="nav-btn" id="btn-agenda" onclick="switchModulo('modulo-agenda')">AGENDA</button>
                <button class="nav-btn" id="btn-crono" onclick="switchModulo('modulo-cronograma')">CRONO</button>
                <button class="nav-btn" id="btn-db" onclick="switchModulo('modulo-alumnos')">BASE DATOS</button>
                <button class="nav-btn" id="btn-notif" onclick="switchModulo('modulo-notificaciones')">
                    NOTIF. <div class="dot-notif" id="active-dot"></div>
                </button>
                <button class="nav-btn" id="btn-mant" style="display:none;" onclick="switchModulo('modulo-mantenimiento')">MANT.</button>
            </div>
        </div>
    </div>

    <script>
        const _sp = supabase.createClient("https://iodtfnclwwgcczxgbmbq.supabase.co", "sb_publishable_uOUPFEp0T_uX85fjqi9xog_6WUS6dKg");
        const DIAS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        const CLASES = ["Align Flow", "Power Flow", "Stretch&Release", "Aerial Balance", "Mega Core", "Life Align"];
        const MODALIDADES = ["Grupales", "Privadas", "Masajes", "Cumpleaños"];
        const FRECUENCIAS = ["1/semana", "2/semana", "3/semana"];
        const WS_ICON_URL = "https://i.postimg.cc/9M0NRgcD/Whats-App-svg.webp";
        let CACHE_ALUMNOS = [];
        let CACHE_HORARIOS = [];
        let USER_ID = "";

        window.onload = async () => {
            initBokeh();
            await checkMaintenanceStatus(); // Verificar bloqueo antes de nada
            if (localStorage.getItem('studio_auth')) {
                USER_ID = localStorage.getItem('user_id');
                startApp();
            } else {
                document.getElementById('login-section').style.display = 'flex';
            }
        };

        // --- SISTEMA MANTENIMIENTO ---
        async function checkMaintenanceStatus() {
            const { data } = await _sp.from('configuracion').select('mantenimiento').eq('id', 1).maybeSingle();
            if (data && data.mantenimiento === true && !localStorage.getItem('studio_auth')) {
                document.getElementById('mantenimiento-bloqueo').style.display = 'flex';
            }
        }

        async function loadMaintenanceView() {
            const { data } = await _sp.from('configuracion').select('mantenimiento').eq('id', 1).maybeSingle();
            if (data) {
                const isMant = data.mantenimiento;
                document.getElementById('select-mantenimiento').value = isMant ? "SI" : "NO";
                const pill = document.getElementById('status-actual');
                pill.innerText = isMant ? "MODO MANTENIMIENTO: ACTIVO" : "SISTEMA ONLINE";
                pill.className = `status-pill ${isMant ? 'pill-on' : 'pill-off'}`;
            }
        }

        async function toggleMantenimiento(val) {
            const boolVal = (val === "SI");
            const { error } = await _sp.from('configuracion').update({ mantenimiento: boolVal }).eq('id', 1);
            if (!error) {
                loadMaintenanceView();
                alert("Estado de mantenimiento actualizado.");
            }
        }

        // --- APP CORE ---
        function initBokeh() {
            const container = document.querySelector('.bokeh-container');
            for (let i = 0; i < 15; i++) {
                const b = document.createElement('div');
                b.className = 'bokeh';
                b.style.width = b.style.height = `${Math.random() * 150 + 50}px`;
                b.style.left = `${Math.random() * 100}%`; b.style.top = `${Math.random() * 100}%`;
                b.style.animationDuration = `${Math.random() * 20 + 15}s`;
                container.appendChild(b);
            }
        }

        async function handleLogin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            const { data } = await _sp.from('usuarios_admin').select('*').eq('usuario', u).eq('password', p).maybeSingle();
            if (data) { 
                localStorage.setItem('studio_auth', 'true');
                localStorage.setItem('user_id', u);
                USER_ID = u;
                startApp(); 
            } else alert("Acceso denegado");
        }

        function handleLogout() {
            localStorage.clear();
            location.reload();
        }

        function startApp() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            
            // Si es ADMIN alto, habilitar pestaña extra
            if (USER_ID === "ADMIN") {
                document.getElementById('btn-mant').style.display = 'block';
                document.getElementById('footer-nav-bar').classList.add('is-admin');
                loadMaintenanceView();
            }

            renderEstructura();
            updateAll();
        }

        // ... [AQUÍ SIGUE TODA TU LÓGICA ORIGINAL DE AGENDA, ALUMNOS Y CRONOGRAMA] ...
        // (Se incluye a continuación para que el código sea funcional 100%)

        function renderEstructura() {
            document.getElementById('listaDias').innerHTML = DIAS.map(d => `
                <div class="dia-item">
                    <div class="dia-header" onclick="toggleDia('${d}')">
                        <span style="font-weight:900; font-size:0.75rem;">${d.toUpperCase()}</span>
                        <span id="badge-${d}" style="font-size:0.5rem; opacity:0.5; background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:8px;">0</span>
                    </div>
                    <div class="dia-content" id="cont-${d}" style="display:none; padding: 0 20px 20px 20px;">
                        <div id="clase-form-${d}"></div>
                        <button class="btn-principal" style="font-size:0.55rem; background:#1a1a1c; color:#fff; padding:12px;" onclick="addClasePopup('${d}')">+ CLASE</button>
                        <div id="clases-${d}" style="margin-top:15px;"></div>
                    </div>
                </div>`).join('');
        }

        function toggleDia(d) {
            const el = document.getElementById(`cont-${d}`);
            const vis = el.style.display === 'block';
            document.querySelectorAll('.dia-content').forEach(c => c.style.display = 'none');
            el.style.display = vis ? 'none' : 'block';
        }

        async function updateAll() {
            const { data } = await _sp.from('horarios').select('*');
            CACHE_ALUMNOS = data.filter(x => x.celda_id === 'DB_ENTRY');
            CACHE_HORARIOS = data.filter(x => x.celda_id !== 'DB_ENTRY').sort((a,b) => a24h(a.contenido.split('|')[0]) - a24h(b.contenido.split('|')[0]));
            
            DIAS.forEach(d => {
                const filtrados = CACHE_HORARIOS.filter(x => x.celda_id === d);
                document.getElementById(`badge-${d}`).innerText = filtrados.length;
                document.getElementById(`clases-${d}`).innerHTML = filtrados.map(i => {
                    const p = i.contenido.split('|');
                    return `<div class="clase-box" style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.75rem;"><b>${p[0]}</b> — ${p[1]}<br><small style="opacity:0.5;">${p[3]}</small></span>
                        <span onclick="borrar('${i.id}')" style="opacity:0.3; cursor:pointer;">×</span>
                    </div>`;
                }).join('');
            });
            renderAlumnosList(CACHE_ALUMNOS);
            renderCronograma();
            processVencimientos();
        }

        function a24h(hStr) {
            if(!hStr) return 0;
            let [t, ampm] = hStr.split(' ');
            let [hh, mm] = t.split(':').map(Number);
            if(ampm==="PM" && hh<12) hh+=12; if(ampm==="AM" && hh===12) hh=0;
            return hh*60+mm;
        }

        function switchModulo(id) {
            const mods = ['modulo-agenda', 'modulo-cronograma', 'modulo-alumnos', 'modulo-notificaciones', 'modulo-mantenimiento'];
            mods.forEach(m => {
                const el = document.getElementById(m);
                if(el) el.style.display = (m === id) ? 'block' : 'none';
            });
            document.getElementById('main-brand').style.display = (id === 'modulo-cronograma' || id === 'modulo-mantenimiento') ? 'none' : 'flex';
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-btn'));
            const bId = { 'modulo-agenda':'btn-agenda', 'modulo-cronograma':'btn-crono', 'modulo-alumnos':'btn-db', 'modulo-notificaciones':'btn-notif', 'modulo-mantenimiento':'btn-mant' }[id];
            if(document.getElementById(bId)) document.getElementById(bId).classList.add('active-btn');
        }

        async function borrar(id) { 
            if(confirm("¿Borrar definitivamente?")) { 
                await _sp.from('horarios').delete().eq('id', id);
                updateAll(); 
            } 
        }

        // Funciones auxiliares simplificadas para el ejemplo completo
        function renderAlumnosList(l) {
            document.getElementById('render-alumnos').innerHTML = l.map(a => `<div class="clase-box"><b>${a.contenido.split('|')[1]}</b></div>`).join('');
        }
        function renderCronograma() {
            document.getElementById('render-cronograma').innerHTML = `<p style="text-align:center; opacity:0.5; font-size:0.7rem;">Cronograma cargado.</p>`;
        }
        function processVencimientos() {
            document.getElementById('active-dot').style.display = 'none';
        }
        function addClasePopup(d) { alert("Abrir formulario para " + d); }
        function abrirFormNuevoAlumno() { alert("Abrir registro de alumno"); }
    </script>
</body>
</html>
