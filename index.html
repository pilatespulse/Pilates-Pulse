<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilates Pulse | Luxury Admin</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #050505;
            --card: #121214;
            --accent: #ffffff;
            --celeste: #a2d2ff;
            --danger: #ff2d55;
            --whatsapp: #25D366;
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Montserrat', sans-serif;
            --font-fancy: 'Playfair Display', serif;
        }

        @keyframes bokehFloat {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.05; }
            100% { transform: translateY(-200px) translateX(-20px); opacity: 0; }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: var(--font-main); 
            margin: 0; background: var(--bg); color: #fff; overflow-x: hidden; 
            letter-spacing: -0.02em; 
        }

        .bokeh-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden; }
        .bokeh { position: absolute; background: #fff; border-radius: 50%; filter: blur(30px); opacity: 0; animation: bokehFloat infinite linear; }

        /* Login & Logout */
        .logout-container { position: absolute; top: 20px; right: 20px; z-index: 1000; }
        .btn-logout { background: transparent; border: 1px solid var(--border); color: #888; padding: 8px 12px; border-radius: 12px; font-size: 0.55rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        #login-section { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .branding-container { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px 0; }
        .logo-pulse-circle { width: 80px; height: 80px; background: #fff; border-radius: 50%; overflow: hidden; border: 3px solid #1a1a1c; transition: transform 0.5s ease; }
        .logo-pulse-circle img { width: 100%; height: 100%; object-fit: cover; }
        .brand-text { font-weight: 900; letter-spacing: 5px; margin-top: 15px; font-size: 1rem; text-transform: uppercase; }

        /* Buscador Alumnos */
        .search-container { margin-bottom: 20px; position: relative; }
        .search-input { background: #1a1a1c; border: 1px solid var(--border); padding: 15px 20px 15px 45px; border-radius: 20px; color: #fff; width: 100%; }
        .search-icon { position: absolute; left: 18px; top: 16px; opacity: 0.3; }

        input, select { width: 100%; background: #1a1a1c; border: 1px solid var(--border); padding: 18px; border-radius: 20px; color: #fff; margin-bottom: 15px; font-family: inherit; }
        
        .btn-principal { background: #fff; color: #000; border: none; padding: 20px; border-radius: 20px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-cancelar { background: #1a1a1c; color: #777; border: 1px solid var(--border); padding: 15px; border-radius: 20px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: 800; }
        
        .main-container { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 150px; }
        
        .dia-item { background: var(--card); margin-bottom: 15px; border-radius: 30px; border: 1px solid var(--border); overflow: hidden; }
        .dia-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .clase-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; margin-bottom: 12px; border: 1px solid var(--border); }

        /* Botones Asistencia 16px */
        .check-btn { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.1); margin-right: 10px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 8px; font-weight: 900; transition: all 0.4s; flex-shrink: 0; background: rgba(255,255,255,0.05); color: transparent; }
        .check-btn.presente { background: var(--whatsapp); border-color: var(--whatsapp); color: #000; }
        .check-btn.ausente { background: var(--danger); border-color: var(--danger); color: #fff; }

        /* Crono Navigation */
        .semana-selector { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; background: #111; padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .sem-btn { background: #fff; color: #000; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: 900; cursor: pointer; }
        .btn-sync { background: var(--celeste); color: #000; border: none; padding: 12px; border-radius: 15px; font-weight: 900; font-size: 0.65rem; width: 100%; margin-bottom: 20px; cursor: pointer; letter-spacing: 1px; }

        .ws-agenda-icon { width: 14px; height: 14px; margin-left: 8px; vertical-align: middle; cursor: pointer; opacity: 0.5; }

        /* Navegación Inferior */
        .footer-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; z-index: 999; }
        .nav-btn { background: rgba(15, 15, 15, 0.85); color: #fff; padding: 12px 2px; border-radius: 15px; border: 1px solid var(--border); font-weight: 800; font-size: 0.5rem; cursor: pointer; backdrop-filter: blur(20px); text-align: center; }
        .nav-btn.active-btn { background: #fff; color: #000; }
        .dot-notif { position: absolute; top: 5px; right: 5px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; display: none; }
    </style>
</head>
<body>

    <div class="bokeh-container"></div>

    <div id="login-section">
        <div class="branding-container">
            <div class="logo-pulse-circle"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text">PILATES PULSE</div>
        </div>
        <div style="width: 90%; max-width: 380px;">
            <input type="text" id="adminUser" placeholder="ADMIN ID">
            <input type="password" id="adminPass" placeholder="PASSWORD">
            <button onclick="handleLogin()" class="btn-principal">ACCEDER</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="logout-container"><button class="btn-logout" onclick="handleLogout()">Salir</button></div>

        <div class="branding-container" id="main-brand" onclick="location.reload()" style="cursor:pointer">
            <div class="logo-pulse-circle" style="width: 50px; height: 50px;"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text" style="font-size: 0.7rem;">PILATES PULSE</div>
        </div>

        <div class="main-container">
            <div id="modulo-agenda">
                <div id="listaDias"></div>
            </div>

            <div id="modulo-cronograma" style="display:none;">
                <div class="semana-selector">
                    <button class="sem-btn" onclick="cambiarSemana(-1)">‹</button>
                    <div style="text-align:center">
                        <div id="txt-mes" style="font-size:0.6rem; font-weight:900; color:#888; text-transform:uppercase">MARZO 2026</div>
                        <div id="txt-rango" style="font-size:0.8rem; font-weight:700; color:var(--celeste)">02 Mar - 08 Mar</div>
                    </div>
                    <button class="sem-btn" onclick="cambiarSemana(1)">›</button>
                </div>
                <div id="crono-sync-area"></div>
                <div id="edit-form-crono"></div>
                <div id="render-cronograma"></div>
            </div>

            <div id="modulo-alumnos" style="display:none;">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="buscadorAlumnos" class="search-input" placeholder="Buscar alumno..." onkeyup="filtrarAlumnos()">
                </div>
                <button id="btn-abrir-registro" class="btn-principal" style="margin-bottom:20px; font-size:0.7rem;" onclick="abrirFormNuevoAlumno()">+ REGISTRAR ALUMNO</button>
                <div id="form-alumno-nuevo"></div>
                <div id="render-alumnos"></div>
            </div>

            <div id="modulo-notificaciones" style="display:none;">
                <h3 style="font-size:0.7rem; color:#fff; letter-spacing:2px; text-align:center; margin-bottom:20px;">PRÓXIMOS VENCIMIENTOS</h3>
                <div id="lista-notificaciones"></div>
            </div>

            <div class="footer-nav">
                <button class="nav-btn active-btn" id="btn-agenda" onclick="switchModulo('modulo-agenda')">AGENDA</button>
                <button class="nav-btn" id="btn-crono" onclick="switchModulo('modulo-cronograma')">CRONO</button>
                <button class="nav-btn" id="btn-db" onclick="switchModulo('modulo-alumnos')">ALUMNOS</button>
                <button class="nav-btn" id="btn-notif" onclick="switchModulo('modulo-notificaciones')">
                    NOTIF. <div class="dot-notif" id="active-dot"></div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const _sp = supabase.createClient("https://iodtfnclwwgcczxgbmbq.supabase.co", "sb_publishable_uOUPFEp0T_uX85fjqi9xog_6WUS6dKg");
        const DIAS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        const CLASES = ["Align Flow", "Power Flow", "Stretch&Release", "Aerial Balance", "Mega Core", "Life Align"];
        
        // LOGICA DE FECHAS 2026
        let lunesActual = new Date(2026, 2, 2); // 02 de Marzo 2026
        const SEMANA_BASE_ID = "W_2026_3_2"; 
        let CACHE_HORARIOS = [];
        let CACHE_ALUMNOS = [];

        window.onload = () => {
            initBokeh();
            if (localStorage.getItem('studio_auth')) startApp();
            else document.getElementById('login-section').style.display = 'flex';
        };

        function initBokeh() {
            const container = document.querySelector('.bokeh-container');
            for (let i = 0; i < 15; i++) {
                const b = document.createElement('div');
                b.className = 'bokeh';
                b.style.width = b.style.height = `${Math.random() * 150 + 50}px`;
                b.style.left = `${Math.random() * 100}%`;
                b.style.top = `${Math.random() * 100}%`;
                b.style.animationDuration = `${Math.random() * 20 + 10}s`;
                container.appendChild(b);
            }
        }

        async function handleLogin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            const { data } = await _sp.from('usuarios_admin').select('*').eq('usuario', u).eq('password', p).maybeSingle();
            if (data) { localStorage.setItem('studio_auth', 'true'); startApp(); } 
            else alert("Acceso Incorrecto");
        }

        function handleLogout() { localStorage.removeItem('studio_auth'); location.reload(); }

        function startApp() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            renderDias();
            updateAll();
        }

        function getSemanaID(date) {
            return `W_${date.getFullYear()}_${date.getMonth()+1}_${date.getDate()}`;
        }

        function updateUIFechas() {
            const fin = new Date(lunesActual);
            fin.setDate(fin.getDate() + 6);
            document.getElementById('txt-mes').innerText = lunesActual.toLocaleDateString('es-ES', {month:'long', year:'numeric'}).toUpperCase();
            document.getElementById('txt-rango').innerText = `${lunesActual.getDate()} ${lunesActual.toLocaleDateString('es-ES',{month:'short'})} - ${fin.getDate()} ${fin.toLocaleDateString('es-ES',{month:'short'})}`;
        }

        function cambiarSemana(n) {
            lunesActual.setDate(lunesActual.getDate() + (n * 7));
            updateAll();
        }

        async function updateAll() {
            updateUIFechas();
            const { data } = await _sp.from('horarios').select('*');
            
            CACHE_ALUMNOS = data.filter(x => x.celda_id === 'DB_ENTRY');
            const targetID = getSemanaID(lunesActual);

            // Filtrar horarios: Si es la semana actual, incluir los que no tienen ID (historial previo)
            CACHE_HORARIOS = data.filter(x => {
                if (x.celda_id === 'DB_ENTRY') return false;
                if (targetID === SEMANA_BASE_ID) {
                    return x.semana_id === targetID || !x.semana_id;
                }
                return x.semana_id === targetID;
            });

            // Botón Conectar si está vacío
            const syncArea = document.getElementById('crono-sync-area');
            syncArea.innerHTML = CACHE_HORARIOS.length === 0 ? 
                `<button class="btn-sync" onclick="conectarAgenda()">🔄 CONECTAR A AGENDA (Reiniciar semana)</button>` : "";

            // Render Agenda
            DIAS.forEach(d => {
                const clases = CACHE_HORARIOS.filter(x => x.celda_id === d);
                document.getElementById(`badge-${d}`).innerText = `${clases.length} Clases`;
                document.getElementById(`clases-${d}`).innerHTML = clases.map(c => renderFichaClase(c)).join('');
            });

            // Render Crono
            document.getElementById('render-cronograma').innerHTML = DIAS.map(d => {
                const clases = CACHE_HORARIOS.filter(x => x.celda_id === d);
                return `<div style="margin-bottom:20px">
                    <div style="font-family:var(--font-fancy); color:var(--celeste); font-size:1.4rem; font-style:italic;">${d}</div>
                    ${clases.map(c => `<div style="font-size:0.75rem; padding:8px 0; border-bottom:1px solid #222;"><b>${c.contenido.split('|')[0]}</b> — ${c.contenido.split('|')[1]}</div>`).join('')}
                </div>`;
            }).join('');

            renderAlumnosList(CACHE_ALUMNOS);
            processNotif();
        }

        function renderFichaClase(clase) {
            const p = clase.contenido.split('|');
            const alumnos = p[3] ? p[3].split(',') : [];
            const asistencia = p[4] ? p[4].split(',') : [];

            const listHtml = alumnos.map((nom, idx) => {
                const st = asistencia[idx] || '0';
                const cls = st === '1' ? 'presente' : (st === '2' ? 'ausente' : '');
                const icon = st === '1' ? '✓' : (st === '2' ? '×' : '');
                return `<div style="display:flex; align-items:center; margin-bottom:8px;">
                    <div class="check-btn ${cls}" onclick="toggleAsis('${clase.id}', ${idx})">${icon}</div>
                    <span style="font-size:0.7rem; opacity:0.8;">${nom.trim()}</span>
                </div>`;
            }).join('');

            return `<div class="clase-box">
                <div style="font-weight:900; font-size:0.8rem; margin-bottom:10px; color:var(--celeste)">${p[0]} — ${p[1]}</div>
                ${listHtml}
                <div style="text-align:right; margin-top:10px; opacity:0.2;" onclick="borrar('${clase.id}')">×</div>
            </div>`;
        }

        async function toggleAsis(id, idx) {
            const clase = CACHE_HORARIOS.find(x => x.id == id);
            let p = clase.contenido.split('|');
            let asisArr = p[4] ? p[4].split(',') : new Array(p[3].split(',').length).fill('0');
            asisArr[idx] = (parseInt(asisArr[idx] || 0) + 1) % 3;
            p[4] = asisArr.join(',');
            await _sp.from('horarios').update({ contenido: p.join('|') }).eq('id', id);
            updateAll();
        }

        async function conectarAgenda() {
            if(!confirm("¿Copiar estructura de la semana pasada?")) return;
            const targetID = getSemanaID(lunesActual);
            
            // Buscar en la semana inmediata anterior
            const anterior = new Date(lunesActual); anterior.setDate(anterior.getDate() - 7);
            const anteriorID = getSemanaID(anterior);

            const { data: todos } = await _sp.from('horarios').select('*');
            const fuente = todos.filter(x => (anteriorID === SEMANA_BASE_ID && !x.semana_id) || x.semana_id === anteriorID);

            if(fuente.length > 0) {
                const nuevas = fuente.map(f => {
                    let p = f.contenido.split('|');
                    p[4] = ""; // Reset asistencia
                    return { celda_id: f.celda_id, semana_id: targetID, contenido: p.join('|') };
                });
                await _sp.from('horarios').insert(nuevas);
                updateAll();
            }
        }

        /* --- LAS DEMAS FUNCIONES QUE NO CAMBIAN --- */
        function renderDias() {
            document.getElementById('listaDias').innerHTML = DIAS.map(d => `
                <div class="dia-item">
                    <div class="dia-header" onclick="toggleDia('${d}')">
                        <span style="font-weight:900; font-size:0.75rem;">${d.toUpperCase()}</span>
                        <span id="badge-${d}" style="font-size:0.55rem; opacity:0.4;">0 Clases</span>
                    </div>
                    <div class="dia-content" id="cont-${d}" style="display:none; padding: 20px;">
                        <div id="clases-${d}"></div>
                    </div>
                </div>`).join('');
        }
        function toggleDia(d) {
            const el = document.getElementById(`cont-${d}`);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }
        function switchModulo(id) {
            ['modulo-agenda', 'modulo-cronograma', 'modulo-alumnos', 'modulo-notificaciones'].forEach(m => document.getElementById(m).style.display = (m === id || (m === 'modulo-cronograma' && id === 'modulo-cronograma')) ? 'block' : 'none');
            document.getElementById('btn-agenda').classList.toggle('active-btn', id === 'modulo-agenda');
            document.getElementById('btn-crono').classList.toggle('active-btn', id === 'modulo-cronograma');
            document.getElementById('btn-db').classList.toggle('active-btn', id === 'modulo-alumnos');
            document.getElementById('btn-notif').classList.toggle('active-btn', id === 'modulo-notificaciones');
        }
        function renderAlumnosList(lista) {
            document.getElementById('render-alumnos').innerHTML = lista.map(a => {
                const p = a.contenido.split('|');
                return `<div class="clase-box"><b>${p[1]}</b><br><small>${p[2]} | ${p[3]}</small><br><small style="color:var(--danger)">Vence: ${p[10]}</small></div>`;
            }).join('');
        }
        function processNotif() {
            const hoy = new Date();
            const vencidos = CACHE_ALUMNOS.filter(a => {
                const v = new Date(a.contenido.split('|')[10]);
                return (v - hoy) / (1000*60*60*24) <= 2;
            });
            document.getElementById('active-dot').style.display = vencidos.length > 0 ? 'block' : 'none';
            document.getElementById('lista-notificaciones').innerHTML = vencidos.map(v => `<div class="clase-box" style="border-left:3px solid var(--danger)">${v.contenido.split('|')[1]} vence en breve</div>`).join('');
        }
        async function borrar(id) { if(confirm("¿Borrar?")) { await _sp.from('horarios').delete().eq('id', id); updateAll(); } }
    </script>
</body>
</html>
