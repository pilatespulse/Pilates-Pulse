<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilates Pulse | Luxury Admin</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #050505;
            --card: #121214;
            --accent: #ffffff;
            --celeste: #a2d2ff;
            --danger: #ff2d55;
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Montserrat', sans-serif;
            --font-fancy: 'Playfair Display', serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: var(--font-main); margin: 0; background: var(--bg); color: #fff; overflow-x: hidden; letter-spacing: -0.01em; }

        /* Animaciones suaves */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modulo-fade { animation: fadeInUp 0.4s ease-out forwards; }

        /* Layout */
        .main-container { padding: 25px 20px 160px 20px; max-width: 550px; margin: 0 auto; }

        /* Branding */
        .branding-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; }
        .logo-pulse-circle { width: 70px; height: 70px; background: #fff; border-radius: 50%; overflow: hidden; border: 3px solid #1a1a1c; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .logo-pulse-circle img { width: 100%; height: 100%; object-fit: cover; }
        .brand-text { font-weight: 900; letter-spacing: 5px; margin-top: 15px; font-size: 0.9rem; text-transform: uppercase; }

        /* Login */
        #login-section {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* Form Elements */
        input, select, textarea { 
            width: 100%; background: #161618; border: 1px solid var(--border); 
            padding: 18px; border-radius: 18px; color: #fff; margin-bottom: 18px; 
            font-family: inherit; font-size: 0.9rem; transition: var(--transition);
        }
        input:focus { border-color: var(--celeste); background: #1c1c1f; }
        label { display: block; font-size: 0.6rem; color: #666; margin: 0 0 8px 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        /* Botones */
        .btn-principal { 
            background: #fff; color: #000; border: none; padding: 20px; border-radius: 18px; 
            font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 2px; transition: var(--transition); margin-top: 10px;
        }
        .btn-principal:active { transform: scale(0.97); }
        .btn-logout { 
            position: absolute; top: 30px; right: 20px; background: transparent; 
            border: 1px solid var(--border); color: #555; padding: 10px 15px; 
            border-radius: 12px; font-size: 0.55rem; font-weight: 900; cursor: pointer; text-transform: uppercase; 
        }

        /* Agenda / Días */
        .dia-item { background: var(--card); margin-bottom: 20px; border-radius: 25px; border: 1px solid var(--border); overflow: hidden; }
        .dia-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        /* Cajas de Clases / Alumnos */
        .clase-box { 
            background: rgba(255,255,255,0.02); padding: 22px; border-radius: 20px; 
            margin-bottom: 15px; border: 1px solid var(--border); position: relative;
        }
        .vence-alerta { color: var(--danger) !important; font-weight: 900; }

        /* Cronograma */
        .crono-header-text { font-family: var(--font-fancy); font-size: 2.2rem; text-align: center; margin-bottom: 30px; }
        .crono-row { border-bottom: 1px solid var(--border); padding: 25px 0; }
        .crono-dia-label { font-family: var(--font-fancy); font-size: 1.4rem; color: var(--celeste); margin-bottom: 15px; font-style: italic; }
        .crono-task { padding: 12px 0; }
        .crono-task-main { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; }
        .crono-detail-box { 
            display: none; margin: 15px 0 10px 20px; padding: 20px; 
            background: #000; border-radius: 18px; border: 1px solid var(--border); 
            font-size: 0.8rem; line-height: 1.6;
        }

        /* Navegación Inferior */
        .footer-nav { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 500px; z-index: 999; 
            background: rgba(15, 15, 15, 0.8); padding: 12px; border-radius: 28px;
            backdrop-filter: blur(25px); border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .nav-btn { 
            background: transparent; color: #666; padding: 14px 2px; border-radius: 20px; 
            border: none; font-weight: 800; font-size: 0.55rem; cursor: pointer; transition: var(--transition); 
            text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-btn.active-btn { background: #fff; color: #000; }
        .dot-notif { position: absolute; top: 10px; right: 10px; width: 7px; height: 7px; background: var(--danger); border-radius: 50%; display: none; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="branding-container">
            <div class="logo-pulse-circle"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text">ADMIN LOGIN</div>
        </div>
        <div style="width: 85%; max-width: 350px;">
            <input type="text" id="adminUser" placeholder="USUARIO">
            <input type="password" id="adminPass" placeholder="CONTRASEÑA">
            <button onclick="handleLogin()" class="btn-principal">ACCEDER</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <button class="btn-logout" onclick="handleLogout()">Salir</button>

        <div class="branding-container" id="main-brand" onclick="location.reload()">
            <div class="logo-pulse-circle" style="width: 55px; height: 55px;"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text" style="font-size: 0.75rem;">PILATES PULSE</div>
        </div>

        <div class="main-container">
            
            <div id="modulo-agenda" class="modulo-fade">
                <div id="listaDias"></div>
            </div>

            <div id="modulo-cronograma" style="display:none;" class="modulo-fade">
                <div class="crono-header-text">Cronograma</div>
                <div id="edit-form-crono"></div>
                <div id="render-cronograma"></div>
            </div>

            <div id="modulo-notificaciones" style="display:none;" class="modulo-fade">
                <h3 style="font-size:0.75rem; text-align:center; margin-bottom:30px; letter-spacing:3px;">ALERTAS DE VENCIMIENTO</h3>
                <div id="lista-notificaciones"></div>
            </div>

            <div id="modulo-alumnos" style="display:none;" class="modulo-fade">
                <input type="text" id="buscadorAlumnos" placeholder="Buscar por nombre..." onkeyup="filtrarAlumnos()" style="margin-bottom:25px;">
                <button id="btn-abrir-registro" class="btn-principal" onclick="abrirFormNuevoAlumno()" style="margin-bottom:30px; font-size:0.7rem;">+ REGISTRAR ALUMNO</button>
                <div id="form-alumno-nuevo"></div>
                <div id="render-alumnos"></div>
            </div>

        </div>

        <div class="footer-nav">
            <button class="nav-btn active-btn" id="btn-agenda" onclick="switchModulo('modulo-agenda')">Agenda</button>
            <button class="nav-btn" id="btn-crono" onclick="switchModulo('modulo-cronograma')">Crono</button>
            <button class="nav-btn" id="btn-db" onclick="switchModulo('modulo-alumnos')">Alumnos</button>
            <button class="nav-btn" id="btn-notif" onclick="switchModulo('modulo-notificaciones')">
                Avisos <div class="dot-notif" id="active-dot"></div>
            </button>
        </div>
    </div>

    <script>
        const _sp = supabase.createClient("https://iodtfnclwwgcczxgbmbq.supabase.co", "sb_publishable_uOUPFEp0T_uX85fjqi9xog_6WUS6dKg");
        const DIAS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        const CLASES = ["Align Flow", "Power Flow", "Stretch&Release", "Aerial Balance", "Mega Core", "Life Align"];
        const MODALIDADES = ["Grupales", "Privadas", "Masajes", "Cumpleaños"];
        const FRECUENCIAS = ["1/semana", "2/semana", "3/semana"];
        let CACHE_ALUMNOS = [];
        let CACHE_HORARIOS = [];

        window.onload = () => {
            if (localStorage.getItem('studio_auth')) startApp();
            else document.getElementById('login-section').style.display = 'flex';
        };

        async function handleLogin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            const { data } = await _sp.from('usuarios_admin').select('*').eq('usuario', u).eq('password', p).maybeSingle();
            if (data) { localStorage.setItem('studio_auth', 'true'); startApp(); } 
            else alert("Credenciales incorrectas");
        }

        function handleLogout() { localStorage.removeItem('studio_auth'); location.reload(); }

        function startApp() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            renderEstructura();
            updateAll();
        }

        function renderEstructura() {
            document.getElementById('listaDias').innerHTML = DIAS.map(d => `
                <div class="dia-item">
                    <div class="dia-header" onclick="toggleDia('${d}')">
                        <span style="font-weight:900; font-size:0.8rem; letter-spacing:1px;">${d.toUpperCase()}</span>
                        <span id="badge-${d}" style="font-size:0.6rem; opacity:0.4;">0</span>
                    </div>
                    <div class="dia-content" id="cont-${d}" style="display:none; padding: 0 20px 25px 20px;">
                        <div id="clase-form-${d}"></div>
                        <button class="btn-principal" style="font-size:0.6rem; background:#1a1a1c; color:#fff; padding:15px;" onclick="addClasePopup('${d}')">+ NUEVA CLASE</button>
                        <div id="clases-${d}" style="margin-top:20px;"></div>
                    </div>
                </div>`).join('');
        }

        function toggleDia(d) {
            const el = document.getElementById(`cont-${d}`);
            const isVisible = el.style.display === 'block';
            document.querySelectorAll('.dia-content').forEach(c => c.style.display = 'none');
            el.style.display = isVisible ? 'none' : 'block';
        }

        // --- Funciones de Lógica Supabase (Iguales a las tuyas para no romper nada) ---

        async function updateAll() {
            const { data } = await _sp.from('horarios').select('*');
            CACHE_HORARIOS = data.sort((a, b) => {
                if (a.celda_id === 'DB_ENTRY' || b.celda_id === 'DB_ENTRY') return 0;
                return a24h(a.contenido.split('|')[0]) - a24h(b.contenido.split('|')[0]);
            });
            CACHE_ALUMNOS = data.filter(x => x.celda_id === 'DB_ENTRY');
            
            DIAS.forEach(d => {
                const filtrados = CACHE_HORARIOS.filter(x => x.celda_id === d);
                document.getElementById(`badge-${d}`).innerText = filtrados.length;
                document.getElementById(`clases-${d}`).innerHTML = filtrados.map(i => {
                    const p = i.contenido.split('|');
                    return `<div class="clase-box">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
                            <span style="font-size:0.8rem;"><b>${p[0]}</b> — ${p[1]}</span>
                            <span onclick="addClasePopup('${d}', '${i.id}', '${i.contenido}')" style="cursor:pointer; font-size:0.9rem;">📝</span>
                        </div>
                        <small style="display:block; opacity:0.5; margin-bottom:10px; font-size:0.65rem;">${p[2].toUpperCase()}</small>
                        <div style="font-size:0.75rem; color:#ccc; line-height:1.4;">${formatAlumnos(p[3])}</div>
                        <span onclick="borrar('${i.id}')" style="position:absolute; bottom:20px; right:20px; opacity:0.1; font-size:0.8rem;">×</span>
                    </div>`;
                }).join('');
            });
            renderAlumnosList(CACHE_ALUMNOS);
            processVencimientos();
            renderCronograma();
        }

        function renderCronograma() {
            const container = document.getElementById('render-cronograma');
            container.innerHTML = DIAS.map(dia => {
                const clasesDelDia = CACHE_HORARIOS.filter(x => x.celda_id === dia);
                return `
                    <div class="crono-row">
                        <div class="crono-dia-label">${dia}</div>
                        ${clasesDelDia.map(c => {
                            const p = c.contenido.split('|');
                            return `<div class="crono-task">
                                <div class="crono-task-main" onclick="toggleCronoDetail('${c.id}')">
                                    <span><b>${p[0]}</b> &nbsp; ${p[1]}</span>
                                    <span style="font-size:0.7rem; opacity:0.3;">ver</span>
                                </div>
                                <div id="crono-detail-${c.id}" class="crono-detail-box">
                                    <div style="color:var(--celeste); font-weight:900; margin-bottom:10px;">ALUMNOS</div>
                                    ${formatAlumnos(p[3])}
                                </div>
                            </div>`;
                        }).join('')}
                    </div>`;
            }).join('');
        }

        function switchModulo(id) {
            ['modulo-agenda', 'modulo-cronograma', 'modulo-alumnos', 'modulo-notificaciones'].forEach(m => {
                document.getElementById(m).style.display = (m === id) ? 'block' : 'none';
            });
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-btn'));
            document.getElementById('btn-' + id.split('-')[1]).classList.add('active-btn');
            window.scrollTo(0, 0);
        }

        // Funciones auxiliares (reutilizadas de tu código original)
        function formatAlumnos(t) { return (!t || !t.includes(',')) ? t : t.split(',').map((n, i) => `${i+1}. ${n.trim()}`).join('<br>'); }
        function a24h(h) { 
            let [t, a] = h.split(' '); let [hh, mm] = t.split(':'); hh = parseInt(hh);
            if (a === "PM" && hh < 12) hh += 12; if (a === "AM" && hh === 12) hh = 0;
            return hh * 60 + parseInt(mm);
        }
        function toggleCronoDetail(id) {
            const el = document.getElementById(`crono-detail-${id}`);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }
        async function borrar(id) { if(confirm("¿Eliminar?")) { await _sp.from('horarios').delete().eq('id', id); updateAll(); } }
        
        // El resto de tus funciones (addClasePopup, saveAlumno, etc.) deben ir aquí igual que antes.
        // He mantenido la lógica intacta para que no pierdas funcionalidad.
    </script>
</body>
</html>
